<header class = "header">
    <h1>{{brand()}}</h1>
    
        <button (click)="changeBrand()">
            Modificar titulo
        </button>
        <button 
            (click)="resetBrand()"
            [disabled]="brand() === 'PPW Angular' "
        >
            Resetear
        </button>
        <button (click)="toggleInfo()">
            {{toggleLabel()}}
        </button>
    

    @if(showInfo()){
        <h3>Show info es TRUE por eso muestra</h3>
    }
</header>

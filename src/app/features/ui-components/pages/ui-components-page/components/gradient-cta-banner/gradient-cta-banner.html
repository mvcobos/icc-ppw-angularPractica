<section
  class="rounded-3xl p-6 shadow-2xl border border-cyan-400/10
         bg-gradient-to-br from-[#0f172a] via-[#111827] to-[#1e293b]
         backdrop-blur-md text-white"
>
  <p
    class="text-xs font-bold uppercase tracking-[0.3em] text-cyan-300"
  >
    {{ eyebrow() }}
  </p>

  <h3 class="mt-2 text-2xl font-black tracking-tight text-white">
    {{ title() }}
  </h3>

  <p class="mt-2 max-w-xl text-sm text-slate-300">
    {{ description() }}
  </p>

  <button
    class="btn btn-sm mt-4 border-none bg-cyan-400 text-slate-900
           hover:bg-cyan-300 transition-all duration-300
           hover:shadow-[0_0_20px_rgba(34,211,238,0.35)]"
  >
    {{ actionLabel() }}
  </button>
</section>
